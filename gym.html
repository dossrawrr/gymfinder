    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Manrope', sans-serif;
    }

    body{

      min-height:100vh;
      color:white;

      background:
      linear-gradient(
      rgba(0,0,0,0.82),
      rgba(0,0,0,0.9)),

      url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1600&auto=format&fit=crop');

      background-size:cover;
      background-position:center;
      background-attachment:fixed;
    }

    /* NAVBAR */

    nav{

      display:flex;
      justify-content:space-between;
      align-items:center;

      padding:20px 50px;

      background:
      rgba(255,255,255,0.05);

      backdrop-filter:blur(10px);

      border-bottom:
      1px solid rgba(255,255,255,0.1);
    }

    .logo{

      font-size:30px;
      font-weight:bold;

      color:#ffb700;
    }

    .menu a{

      color:white;
      text-decoration:none;

      margin-left:25px;

      font-weight:bold;

      transition:0.3s;
    }

    .menu a:hover{

      color:#ffb700;
    }

    /* HEADER */

    header{

      text-align:center;

      padding:100px 20px 40px;
    }

    header h1{

      font-size:75px;

      margin-bottom:20px;

      background:
      linear-gradient(135deg,#ffffff,#ffb700);

      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    header p{

      color:#d1d5db;

      font-size:20px;
    }

    /* SEARCH */

    .search-box{

      display:flex;
      justify-content:center;
      align-items:center;

      gap:15px;

      flex-wrap:wrap;

      padding:20px;
    }

    .search-box input{

      width:420px;
      max-width:90%;

      padding:18px;

      border:none;
      outline:none;

      border-radius:18px;

      background:
      rgba(255,255,255,0.08);

      backdrop-filter:blur(10px);

      color:white;

      font-size:16px;

      border:
      1px solid rgba(255,255,255,0.08);
    }

    .search-box input::placeholder{

      color:#cbd5e1;
    }

    .search-box button{

      padding:18px 28px;

      border:none;

      border-radius:18px;

      background:
      linear-gradient(135deg,#ff7b00,#ffb700);

      color:white;

      font-size:16px;
      font-weight:bold;

      cursor:pointer;

      transition:0.3s;

      box-shadow:
      0 10px 30px rgba(255,149,0,0.3);
    }

    .search-box button:hover{

      transform:
      translateY(-5px)
      scale(1.03);
    }

    /* CARD */

    .gym-container{

      display:grid;

      grid-template-columns:
      repeat(auto-fit,minmax(320px,1fr));

      gap:35px;

      padding:50px;
    }

    .gym-card{

      background:
      rgba(255,255,255,0.06);

      backdrop-filter:blur(12px);

      border:
      1px solid rgba(255,255,255,0.08);

      border-radius:30px;

      overflow:hidden;

      transition:0.4s;

      box-shadow:
      0 10px 35px rgba(0,0,0,0.35);

      animation:fadeUp 1s ease;
    }

    .gym-card:hover{

  transform:
  translateY(-15px)
  scale(1.02);

  box-shadow:
  0 25px 60px rgba(255,149,0,0.25);

  border:
  1px solid rgba(255,183,0,0.35);
}
  

    .gym-card img{

      width:100%;
      height:230px;

      object-fit:cover;
      filter:
brightness(0.88);
    }

    .gym-info{

      padding:28px;
    }

    .gym-info h2{

      color:#ffb700;

      font-size:32px;

      margin-bottom:18px;
    }

    .gym-info p{

      color:#d1d5db;

      line-height:1.8;

      margin-bottom:12px;
    }

    .rating{

      color:gold;

      font-size:20px;
    }

    /* MAP BUTTON */

    .map-btn{

      display:block;

      margin-top:20px;

      text-decoration:none;
    }

    .map-btn button{

      width:100%;

      padding:16px;

      border:none;

      border-radius:18px;

      background:
      linear-gradient(135deg,#ff7b00,#ffb700);

      color:white;

      font-size:16px;
      font-weight:bold;

      cursor:pointer;

      transition:0.3s;

      box-shadow:
      0 10px 30px rgba(255,149,0,0.3);
    }

    .map-btn button:hover{

      transform:
      translateY(-5px);

      box-shadow:
      0 15px 35px rgba(255,149,0,0.4);
    }

    /* FOOTER */

    footer{

      text-align:center;

      padding:40px 20px;

      color:#cbd5e1;
    }

    /* ANIMATION */

    @keyframes fadeUp{

      from{
        opacity:0;
        transform:translateY(50px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

        gap:15px;

        display:flex;
        gap:15px;
      }

      }

      header h1{

        font-size:48px;
      }

      header p{

        font-size:16px;
      }

      .gym-container{

        padding:25px;
      }

    }

/* ========================= */
/* MODERN ANIMATION */
/* ========================= */

html{
  scroll-behavior:smooth;
}

/* NAVBAR FLOAT */

nav{

  position:sticky;

  top:0;

  z-index:999;

  box-shadow:
  0 5px 30px rgba(0,0,0,0.35);
}

/* HEADER GLOW */

header h1{

  animation:
  glow 3s infinite alternate;
}

/* SEARCH EFFECT */

.search-box input{

  transition:0.3s;
}

.search-box input:focus{

  border:
  1px solid #ffb700;

  box-shadow:
  0 0 25px rgba(255,183,0,0.25);

  transform:scale(1.02);
}

/* CARD MODERN */

.gym-card{

  animation:
  fadeUp 1s ease;
}

/* CARD HOVER */

.gym-card:hover{

  transform:
  translateY(-15px)
  scale(1.02);

  box-shadow:
  0 25px 60px rgba(255,149,0,0.25);
}

/* IMAGE EFFECT */

.gym-card img{

  height:320px;

  object-fit:cover;

  object-position:center;

  transition:0.5s;
}

.gym-card:hover img{

  transform:scale(1.08);
}

/* BUTTON EFFECT */

.map-btn button:active{

  transform:scale(0.96);
}

/* MENU UNDERLINE */

.menu a{

  position:relative;
}

.menu a::after{

  content:'';

  position:absolute;

  width:0%;

  height:2px;

  left:0;
  bottom:-6px;

  background:#ffb700;

  transition:0.3s;
}

.menu a:hover::after{

  width:100%;
}

/* ANIMATION */

@keyframes glow{

  from{

    text-shadow:
    0 0 10px rgba(255,183,0,0.2),
    0 0 20px rgba(255,183,0,0.2);
  }

  to{

    text-shadow:
    0 0 20px rgba(255,183,0,0.5),
    0 0 40px rgba(255,183,0,0.4);
  }

}

@keyframes fadeUp{

  from{

    opacity:0;

    transform:
    translateY(60px);
  }

  to{

    opacity:1;

    transform:
    translateY(0);
  }

}

/* ========================= */
/* CINEMATIC LOADER */
/* ========================= */

.loader{

  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:100vh;

  background:#050505;

  display:flex;
  justify-content:center;
  align-items:center;

  z-index:99999;

  animation:
  loaderOut 1.8s forwards;

  animation-delay:1.5s;
}

.loader-text{

  color:#ffb700;

  font-size:50px;

  font-weight:700;

  letter-spacing:8px;

  animation:
  pulse 4s infinite;
}

/* LOADER OUT */

@keyframes loaderOut{

  to{

    opacity:0;

    visibility:hidden;
  }

}

/* TEXT PULSE */

@keyframes pulse{

  0%{

    opacity:0.5;

    transform:scale(0.95);
  }

  50%{

    opacity:1;

    transform:scale(1);
  }

  100%{

    opacity:0.5;

    transform:scale(0.95);
  }

}
/* ========================= */
/* TWO ROW MOVING CARD */
/* ========================= */

.gym-wrapper{

  overflow-x:auto;

  overflow-y:hidden;

  scrollbar-width:none;

  cursor:grab;

  padding:40px 0;

  scroll-behavior:smooth;
}

.gym-row{

  display:flex;

  width:max-content;

  gap:35px;

  margin-bottom:35px;

}

/* CONTAINER */

.gym-container{

  display:flex;

  gap:35px;

  width:max-content;
}

/* CARD */

.gym-card{

  min-width:150px;
}

/* LEFT */

.left{

  animation:
  moveLeft 20s linear infinite;
}

/* RIGHT */

.right{

  animation:
  moveRight 20s linear infinite;
}

/* LEFT ANIMATION */

@keyframes moveLeft{

  from{

    transform:
    translateX(0);
  }

  to{

    transform:
    translateX(-50%);
  }

}

/* RIGHT ANIMATION */

@keyframes moveRight{

  from{

    transform:
    translateX(-50%);
  }

  to{

    transform:
    translateX(0);
  }

}
/* HIDE SCROLLBAR */

.gym-wrapper::-webkit-scrollbar{

  display:none;
}
/* DRAG SCROLL */

.gym-wrapper{

  overflow-x:auto;

  overflow-y:hidden;

  scrollbar-width:none;

  cursor:grab;

  scroll-behavior:smooth;
}

.gym-wrapper::-webkit-scrollbar{

}

.close-btn{

  position:absolute;

  top:15px;
  right:20px;

  font-size:24px;

  cursor:pointer;

  color:#ffb700;
}

  <script>

    function searchGym(){

      let input =
      document
      .getElementById("searchInput")
      .value
      .toLowerCase();

      let cards =
      document
      .querySelectorAll(".gym-card");

      cards.forEach(card => {

        let title =
        card
        .querySelector("h2")
        .innerText
        .toLowerCase();
let rows =
document.querySelectorAll(".gym-row");

if(input !== ""){

  document
   .getElementById("backBtn")
   .style.display = "block";

  rows.forEach(row => {

    row.style.animation = "none";

  });

}else{
  document
   .getElementById("backBtn")
   .style.display = "none";
  rows.forEach(row => {

    row.style.animation = "";

  });

}
        if(title.includes(input)){

          card.style.display = "block";

        }else{

          card.style.display = "none";

        }

      });

    }

function openPopup(name,address,time,rating,map){

  document
  .getElementById("popupTitle")
  .innerText = name;

  document
  .getElementById("popupAddress")
  .innerText = "📍 " + address;

  document
  .getElementById("popupTime")
  .innerText = "🕒 " + time;

  document
  .getElementById("popupRating")
  .innerText = rating;

  document
  .getElementById("popupMap")
  .href = map;

  document
  .getElementById("popup")
  .classList.add("show");

  let rows =
  document.querySelectorAll(".gym-row");

  rows.forEach(row => {

    row.style.animationPlayState = "paused";

  });

}

function closePopup(){

  document
  .getElementById("popup")
  .classList.remove("show");

  let rows =
  document.querySelectorAll(".gym-row");

  rows.forEach(row => {

    row.style.animationPlayState = "running";

  });

}
function resetSearch(){

  document
  .getElementById("searchInput")
  .value = "";

  let cards =
  document
  .querySelectorAll(".gym-card");

  cards.forEach(card => {

    card.style.display = "block";

  });

  document
  .getElementById("backBtn")
  .style.display = "none";

  let rows =
  document
  .querySelectorAll(".gym-row");

  rows.forEach(row => {

    row.style.animation = "";

    row.style.animationPlayState = "running";

  });

}
