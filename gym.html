<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gym Finder</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght=300;400;500;700&display=swap');

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Manrope', sans-serif;
    }

    body{
      min-height:100vh;
      color:white;
      background:
      linear-gradient(
      rgba(0,0,0,0.82),
      rgba(0,0,0,0.9)),
      url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1600&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
      background-attachment:fixed;
    }

    /* NAVBAR */
    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 50px;
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(255,255,255,0.1);
      position:sticky;
      top:0;
      z-index:999;
      box-shadow:0 5px 30px rgba(0,0,0,0.35);
    }

    .logo{
      font-size:30px;
      font-weight:bold;
      color:#ffb700;
    }

    .menu a{
      color:white;
      text-decoration:none;
      margin-left:25px;
      font-weight:bold;
      transition:0.3s;
      position:relative;
    }

    .menu a:hover{
      color:#ffb700;
    }

    .menu a::after{
      content:'';
      position:absolute;
      width:0%;
      height:2px;
      left:0;
      bottom:-6px;
      background:#ffb700;
      transition:0.3s;
    }

    .menu a:hover::after{
      width:100%;
    }

    /* MAIN CONTENT WRAPPER */
    .page-content {
      position: relative;
      width: 100%;
    }

    /* POSITIONED TEPAT DI BAWAH MENU NAVBAR */
    #backBtn {
      position: absolute;
      top: 15px;
      right: 50px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #ffb700;
      padding: 12px 22px;
      border-radius: 15px;
      font-size: 14px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: 0.3s;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
      z-index: 105;
    }

    #backBtn:hover {
      background: rgba(255, 183, 0, 0.15);
      border-color: #ffb700;
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(255,183,0,0.2);
    }

    /* HEADER */
    header{
      text-align:center;
      padding:100px 20px 20px;
    }

    header h1{
      font-size:75px;
      margin-bottom:20px;
      background:linear-gradient(135deg,#ffffff,#ffb700);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      animation:glow 3s infinite alternate;
    }

    header p{
      color:#d1d5db;
      font-size:20px;
    }

    /* AREA SEARCH */
    .search-box{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .search-fields {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
      width: 100%;
    }

    .search-box input{
      width:420px;
      max-width:90%;
      padding:18px;
      border:1px solid rgba(255,255,255,0.08);
      outline:none;
      border-radius:18px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(10px);
      color:white;
      font-size:16px;
      transition:0.3s;
    }

    .search-box input::placeholder{
      color:#cbd5e1;
    }

    .search-box input:focus{
      border:1px solid #ffb700;
      box-shadow:0 0 25px rgba(255,183,0,0.25);
      transform:scale(1.02);
    }

    .search-box button{
      padding:18px 28px;
      border:none;
      border-radius:18px;
      background:linear-gradient(135deg,#ff7b00,#ffb700);
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 10px 30px rgba(255,149,0,0.3);
    }

    .search-box button:hover{
      transform:translateY(-5px) scale(1.03);
    }

    /* WRAPPER & ROW */
    .gym-wrapper{
      overflow-x:auto;
      overflow-y:hidden;
      scrollbar-width:none;
      cursor:grab;
      padding:20px 0;
      scroll-behavior:smooth;
      user-select: none;
    }

    .gym-wrapper::-webkit-scrollbar{
      display:none;
    }

    .gym-wrapper:has(.detail-btn:hover) .gym-row,
    .gym-wrapper:active .gym-row {
      animation-play-state: paused !important;
    }

    .gym-wrapper:active {
      cursor: grabbing;
    }

    .gym-row{
      display:flex;
      width:max-content;
      gap:35px;
      margin-bottom:15px;
    }

    .gym-container{
      display:flex;
      gap:35px;
      width:max-content;
      padding: 0 50px;
    }

    /* LEFT & RIGHT ANIMATION */
    .left{
      animation:moveLeft 25s linear infinite;
    }

    .right{
      animation:moveRight 25s linear infinite;
    }

    @keyframes moveLeft{
      from{ transform:translateX(0); }
      to{ transform:translateX(-30%); }
    }

    @keyframes moveRight{
      from{ transform:translateX(-30%); }
      to{ transform:translateX(0); }
    }

    /* CARD */
    .gym-card{
      min-width:290px;
      background:rgba(255,255,255,0.06);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:30px;
      overflow:hidden;
      transition:0.4s;
      box-shadow:0 10px 35px rgba(0,0,0,0.35);
      animation:fadeUp 1s ease;
    }

    .gym-card:hover{
      transform:translateY(-15px) scale(1.02);
      box-shadow:0 25px 60px rgba(255,149,0,0.25);
      border:1px solid rgba(255,183,0,0.35);
    }

    .gym-card img{
      width:100%;
      height:210px;
      object-fit:cover;
      object-position:center;
      filter:brightness(0.88);
      transition:0.5s;
      pointer-events: none;
    }

    .gym-card:hover img{
      transform:scale(1.08);
    }

    .gym-info{
      padding:28px;
    }

    .gym-info h2{
      color:#ffb700;
      font-size:28px;
      margin-bottom:18px;
    }

    .gym-info p{
      color:#d1d5db;
      line-height:1.8;
      margin-bottom:12px;
    }

    .rating{
      color:gold;
      font-size:20px;
    }

    /* BUTTONS */
    .detail-btn{
      width:100%;
      padding:16px;
      border:none;
      border-radius:18px;
      background:linear-gradient(135deg,#ff7b00,#ffb700);
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      margin-top:15px;
      box-shadow:0 10px 30px rgba(255,149,0,0.3);
    }

    .detail-btn:hover{
      transform:translateY(-5px);
      box-shadow:0 15px 35px rgba(255,149,0,0.4);
    }

    .map-btn{
      display:block;
      margin-top:20px;
      text-decoration:none;
    }

    .map-btn button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:18px;
      background:linear-gradient(135deg,#ff7b00,#ffb700);
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 10px 30px rgba(255,149,0,0.3);
    }

    .map-btn button:hover{
      transform:translateY(-5px);
      box-shadow:0 15px 35px rgba(255,149,0,0.4);
    }

    .map-btn button:active{
      transform:scale(0.96);
    }

    /* FOOTER */
    footer{
      text-align:center;
      padding:40px 20px;
      color:#cbd5e1;
    }

    /* ANIMATIONS */
    @keyframes glow{
      from{
        text-shadow:0 0 10px rgba(255,183,0,0.2), 0 0 20px rgba(255,183,0,0.2);
      }
      to{
        text-shadow:0 0 20px rgba(255,183,0,0.5), 0 0 40px rgba(255,183,0,0.4);
      }
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(60px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    /* ELEGAN LOADER */
    .loader{
      position:fixed;
      top:0; left:0;
      width:100%; height:100vh;
      background:#050505;
      display:flex; justify-content:center; align-items:center;
      z-index:99999;
      animation: loaderOut 0.8s cubic-bezier(0.7, 0, 0.3, 1) forwards;
      animation-delay: 2s;
    }

    .loader-text{
      color:#ffb700;
      font-size:75px;
      font-weight:500;
      text-transform: uppercase;
      animation: sleekTracking 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    @keyframes loaderOut{
      to{ opacity:0; visibility:hidden; }
    }

    @keyframes sleekTracking {
      0% {
        opacity: 0;
        letter-spacing: 0px;
      }
      100% {
        opacity: 1;
        letter-spacing: 12px;
      }
    }

    /* POPUP */
    .popup{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100vh;
      background:rgba(0,0,0,0.75);
      backdrop-filter:blur(8px);
      display:flex;
      justify-content:center;
      align-items:center;
      opacity:0;
      visibility:hidden;
      transition:0.4s;
      z-index:9999;
      pointer-events:none;
    }

    .popup.show{
      opacity:1;
      visibility:visible;
      pointer-events:auto;
    }

    .popup-content{
      width:90%;
      max-width:420px;
      padding:35px;
      border-radius:30px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.1);
      color:white;
      position:relative;
      animation:fadeUp 0.4s ease;
    }

    .popup-content h2{
      color:#ffb700;
      margin-bottom:20px;
      font-size:30px;
    }

    .popup-content p{
      margin-bottom:15px;
      color:#d1d5db;
      line-height:1.7;
    }

    .close-btn{
      position:absolute;
      top:15px;
      right:20px;
      font-size:24px;
      cursor:pointer;
      color:#ffb700;
    }

    /* RESPONSIVE MOBILE */
    @media(max-width:768px){
      nav{
        flex-direction:column;
        gap:15px;
      }
      .menu{
        display:flex;
        gap:15px;
      }
      .menu a{
        margin-left:0;
      }
      header h1{
        font-size:48px;
      }
      header p{
        font-size:16px;
      }
      
      #backBtn {
        right: auto;
        left: 50%;
        transform: translateX(-50%);
        top: 10px;
        font-size: 13px;
        padding: 10px 18px;
      }
      #backBtn:hover {
        transform: translateX(-50%) translateY(-3px);
      }

      .gym-container{
        padding: 0 25px;
      }
      .loader-text{
        font-size:42px;
      }
    }
  </style>
</head>

  <script>
    // FITUR DRAG SCROLL VIA MOUSE UNTUK DEKSTOP/PC
    const wrappers = document.querySelectorAll('.gym-wrapper');
    wrappers.forEach(wrapper => {
      let isDown = false;
      let startX;
      let scrollLeft;

      wrapper.addEventListener('mousedown', (e) => {
        isDown = true;
        startX = e.pageX - wrapper.offsetLeft;
        scrollLeft = wrapper.scrollLeft;
        wrapper.style.scrollBehavior = 'auto';
      });
      
      wrapper.addEventListener('mouseleave', () => {
        isDown = false;
      });
      
      wrapper.addEventListener('mouseup', () => {
        isDown = false;
        wrapper.style.scrollBehavior = 'smooth';
      });
      
      wrapper.addEventListener('mousemove', (e) => {
        if(!isDown) return;
        e.preventDefault();
        const x = e.pageX - wrapper.offsetLeft;
        const walk = (x - startX) * 1.5;
        wrapper.scrollLeft = scrollLeft - walk;
      });
    });

    function searchGym(){
      let input = document.getElementById("searchInput").value.toLowerCase();
      let cards = document.querySelectorAll(".gym-card");
      let rows = document.querySelectorAll(".gym-row");

      if(input !== ""){
        document.getElementById("backBtn").style.display = "block";
        rows.forEach(row => {
          row.style.animation = "none";
        });
      } else {
        document.getElementById("backBtn").style.display = "none";
        rows.forEach(row => {
          row.style.animation = "";
        });
      }

      cards.forEach(card => {
        let title = card.querySelector("h2").innerText.toLowerCase();
        if(title.includes(input)){
          card.style.display = "block";
        }else{
          card.style.display = "none";
        }
      });
    }

    function openPopup(name, address, time, rating, map){
      document.getElementById("popupTitle").innerText = name;
      document.getElementById("popupAddress").innerText = "📍 " + address;
      document.getElementById("popupTime").innerText = "🕒 " + time;
      document.getElementById("popupRating").innerText = rating;
      document.getElementById("popupMap").href = map;
      document.getElementById("popup").classList.add("show");

      let rows = document.querySelectorAll(".gym-row");
      rows.forEach(row => {
        row.style.animationPlayState = "paused";
      });
    }

    function closePopup(){
      document.getElementById("popup").classList.remove("show");
      let rows = document.querySelectorAll(".gym-row");
      rows.forEach(row => {
        row.style.animationPlayState = "running";
      });
    }

    function resetSearch(){
      document.getElementById("searchInput").value = "";
      let cards = document.querySelectorAll(".gym-card");
      
      cards.forEach(card => {
        card.style.display = "block";
      });

      document.getElementById("backBtn").style.display = "none";
      
      let rows = document.querySelectorAll(".gym-row");
      rows.forEach(row => {
        row.style.animation = "";
        row.style.animationPlayState = "running";
      });
    }
  </script>
